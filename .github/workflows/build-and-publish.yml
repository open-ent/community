name: Build & Publish Fat Mod

on:
  push:
    branches:
      - main
      - master
      - develop
      - dev
      - '*-patched'
      - '*-patched-dev'
    tags: ['*']
  pull_request:
    branches: [main, master, develop, dev]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-and-publish:
    name: Build & Publish Fat Mod
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- Frontend (Gulp 3 / Webpack 1 / TypeScript) ---
      # Le frontend de ce module historique Atos se build avec Gulp 3.9.1,
      # qui n'est compatible qu'avec Node <= 10 (erreur "primordials is not defined"
      # sur Node >= 12). docker-compose.yml epingle d'ailleurs node:10-alpine.
      - uses: actions/setup-node@v4
        with:
          node-version: '10'

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend (Gulp)
        run: node_modules/gulp/bin/gulp.js build

      # --- Backend (Maven, Java 8) ---
      - uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: temurin
          cache: maven

      - name: Configure Maven pour GitHub Packages
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << EOF
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>$GITHUB_ACTOR</username>
                <password>$GITHUB_TOKEN</password>
              </server>
            </servers>
            <profiles>
              <profile>
                <id>github-packages</id>
                <repositories>
                  <repository>
                    <id>github</id>
                    <name>GitHub open-ent Packages</name>
                    <url>https://maven.pkg.github.com/open-ent/entcore-v2</url>
                    <releases><enabled>true</enabled></releases>
                    <snapshots><enabled>true</enabled></snapshots>
                  </repository>
                </repositories>
              </profile>
            </profiles>
            <activeProfiles>
              <activeProfile>github-packages</activeProfile>
            </activeProfiles>
          </settings>
          EOF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Build fat JAR
        run: |
          # buildnumber-maven-plugin (via app-parent) ne resout pas le SCM en CI
          # (checkout shallow/detache) -> on injecte explicitement commit et branche
          # pour remplir SCM-Commit-Id / SCM-Branch du MANIFEST.
          mvn clean package -DskipTests -B \
            -DbuildNumber="${GITHUB_SHA::8}" -DscmBranch="${GITHUB_REF_NAME}"

      - name: Run tests
        if: github.event_name == 'pull_request'
        run: mvn test -B

      - name: Configure Maven for GitHub Packages
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0
                                        https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>github</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Publish fat JAR to GitHub Packages
        continue-on-error: true
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          GROUP_ID=$(mvn help:evaluate -Dexpression=project.groupId -q -DforceStdout)
          ARTIFACT_ID=$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout)
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          FAT_JAR=$(ls target/*-fat.jar 2>/dev/null | head -1)
          echo "Publishing ${GROUP_ID}:${ARTIFACT_ID}:${VERSION}:fat"
          if [ -z "${FAT_JAR}" ]; then
            echo "::error::Fat JAR not found"
            ls -la target/*.jar 2>/dev/null || echo "No JARs found in target/"
            exit 1
          fi
          mvn deploy:deploy-file \
            -Dfile="${FAT_JAR}" \
            -DgroupId="${GROUP_ID}" \
            -DartifactId="${ARTIFACT_ID}" \
            -Dversion="${VERSION}" \
            -Dclassifier=fat \
            -Dpackaging=jar \
            -DrepositoryId=github \
            -Durl="https://maven.pkg.github.com/${{ github.repository }}" \
            -B

      - name: Publish fat JAR to rct-nexus
        continue-on-error: true
        if: startsWith(github.ref, 'refs/tags/')
        env:
          NEXUS_USER: ${{ secrets.NEXUS_USER }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
        run: |
          cat > /tmp/nx-settings.xml <<EOF
          <settings><servers><server><id>pt-releases</id><username>${NEXUS_USER}</username><password>${NEXUS_PASSWORD}</password></server></servers></settings>
          EOF
          # Coords resolues via help:evaluate (le nom du fat-mod depend de app-parent ;
          # on ne presuppose pas le format grp~art~ver-fat.jar).
          GROUP_ID=$(mvn help:evaluate -Dexpression=project.groupId -q -DforceStdout)
          ARTIFACT_ID=$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout)
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          FAT_JAR=$(ls target/*-fat.jar 2>/dev/null | head -1)
          if [ -z "${FAT_JAR}" ]; then echo "::error::Fat JAR not found"; exit 1; fi
          FAT_ABS=$(realpath "${FAT_JAR}")
          echo "Deploying ${GROUP_ID}:${ARTIFACT_ID}:${VERSION}:fat -> rct-nexus"
          # IMPORTANT : lancer depuis /tmp (dossier SANS pom) sinon mvn lit le pom du projet.
          cd /tmp
          mvn deploy:deploy-file -s /tmp/nx-settings.xml \
            -Dfile="${FAT_ABS}" \
            -DgroupId="${GROUP_ID}" \
            -DartifactId="${ARTIFACT_ID}" \
            -Dversion="${VERSION}" \
            -Dclassifier=fat \
            -Dpackaging=jar \
            -DrepositoryId=pt-releases \
            -Durl="https://rct-nexus.tech.fr/repository/maven-releases/" \
            -B

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: target/*-fat.jar
          generate_release_notes: true
